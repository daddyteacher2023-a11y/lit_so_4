<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>귀 기울이면 마음이 들려요 · 4차시 경청과 공감</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F2F8F5; --ink: #20404F; --sub: #5A7A85;
    --coral: #FF8A5C; --sun: #FFD34E; --teal: #5BBFAF;
    --soft: #E2EFEA; --wrong: #F2B8A8;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); font-family: 'Gowun Dodum', sans-serif; color: var(--ink); }
  .jua { font-family: 'Jua', sans-serif; }
  button { font-family: 'Gowun Dodum', sans-serif; cursor: pointer; border: none; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 28px 20px 60px; }
  .card { background: #fff; border-radius: 24px; padding: 28px 24px; box-shadow: 0 4px 0 rgba(32,64,79,.08); }
  .pop { transition: transform .15s ease; }
  .pop:hover { transform: translateY(-3px); }
  .pop:active { transform: scale(.97); }
  @media (prefers-reduced-motion: reduce) { .pop, .pop:hover, .pop:active { transition: none; transform: none; } }
  .bigbtn { font-family: 'Jua', sans-serif; background: var(--coral); color: #fff; font-size: 20px; padding: 14px 32px; border-radius: 999px; box-shadow: 0 4px 0 rgba(32,64,79,.15); }
  .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .backbtn { font-family: 'Jua', sans-serif; background: #fff; color: var(--ink); border-radius: 999px; padding: 8px 16px; font-size: 15px; box-shadow: 0 3px 0 rgba(32,64,79,.1); }
  .badge { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .badge-n { font-family: 'Jua', sans-serif; color: #fff; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .badge-t { font-family: 'Jua', sans-serif; font-size: 20px; }
  .fb { margin-top: 18px; border-radius: 16px; padding: 16px; font-size: 15px; line-height: 1.6; }
  .center { text-align: center; }
  .hidden { display: none; }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ─── 데이터 ─── */
const quiz1 = [
  { text: "친구의 눈을 바라보며 들어요", ear: true,  why: "눈을 맞추면 '네 이야기를 듣고 있어'라는 마음이 전해져요." },
  { text: "휴대폰을 보면서 들어요", ear: false, why: "다른 곳을 보면 친구는 '내 말이 중요하지 않나?' 하고 느껴요." },
  { text: "고개를 끄덕이며 들어요", ear: true,  why: "끄덕임은 '잘 듣고 있어'라는 신호예요." },
  { text: "말을 끊고 내 이야기를 해요", ear: false, why: "친구가 하고 싶은 말을 끝까지 못 하게 돼요." },
  { text: "이야기가 끝날 때까지 기다려요", ear: true,  why: "끝까지 기다려 주면 친구가 마음을 편하게 열 수 있어요." },
  { text: "듣는 척하며 딴생각을 해요", ear: false, why: "몸만 있고 마음이 없으면 진짜 듣는 것이 아니에요." },
];

const scenes = [
  { friend: "어제 우리 강아지가 아파서 병원에 갔어… 너무 걱정돼.", emoji: "🐶",
    options: [
      { text: "많이 걱정됐겠다. 강아지가 얼른 나았으면 좋겠어.", good: true,  fb: "친구의 마음을 그대로 읽어 주었어요. 이게 바로 공감이에요!" },
      { text: "우리 집 고양이는 한 번도 안 아팠는데?", good: false, fb: "갑자기 내 이야기를 하면 친구는 마음을 알아주지 않는다고 느껴요." },
      { text: "병원 갔으면 됐네. 별일 아니야.", good: false, fb: "친구의 걱정을 작게 만들면 친구는 서운해져요. 마음부터 알아주세요." },
    ]},
  { friend: "발표 시간에 실수해서 친구들이 웃었어. 너무 창피했어…", emoji: "😳",
    options: [
      { text: "다음엔 연습을 더 많이 해.", good: false, fb: "충고보다 먼저 필요한 건 마음을 알아주는 말이에요." },
      { text: "정말 창피하고 속상했겠다. 나라도 그랬을 것 같아.", good: true,  fb: "친구의 감정을 이름 붙여 주고 함께 느껴 주었어요. 훌륭한 공감이에요!" },
      { text: "에이, 그게 뭐가 창피해.", good: false, fb: "친구가 느낀 감정을 부정하면 친구는 더 외로워져요." },
    ]},
  { friend: "이번 주말에 이사 가. 전학 가야 해서 너희랑 헤어지는 게 슬퍼.", emoji: "🚚",
    options: [
      { text: "새 학교가 더 좋을 수도 있잖아. 좋게 생각해.", good: false, fb: "슬픈 마음을 서둘러 바꾸려 하기보다 먼저 들어 주세요." },
      { text: "그렇구나. (휴대폰을 본다)", good: false, fb: "몸이 다른 곳을 향하면 말로 해도 공감이 전해지지 않아요." },
      { text: "헤어진다니 나도 슬퍼. 그동안 같이 놀아서 정말 좋았어.", good: true,  fb: "친구의 슬픔을 함께 느끼고 솔직한 마음을 전했어요. 최고의 공감이에요!" },
    ]},
];

const feelCase = {
  situation: "운동회 달리기에서 넘어졌지만 끝까지 달려서 들어온 친구",
  emoji: "🏃",
  feelings: [
    { name: "속상함", emoji: "😢" }, { name: "창피함", emoji: "😳" },
    { name: "뿌듯함", emoji: "😊" }, { name: "아쉬움", emoji: "😔" },
    { name: "고마움", emoji: "🥰" }, { name: "화남", emoji: "😠" },
  ],
};

/* ─── 상태 ─── */
const state = {
  screen: "home",
  done: { a1: false, a2: false, a3: false },
  a1: { i: 0, picked: null, score: 0 },
  a2: { i: 0, picked: null },
  a3: { chosen: [], show: false },
};

const app = document.getElementById("app");
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function go(screen) {
  if (screen === "a1") state.a1 = { i: 0, picked: null, score: 0 };
  if (screen === "a2") state.a2 = { i: 0, picked: null };
  if (screen === "a3") state.a3 = { chosen: [], show: false };
  state.screen = screen;
  render();
  window.scrollTo(0, 0);
}

function finish(id) {
  state.done[id] = true;
  if (id === "a1") go("a2");
  else if (id === "a2") go("a3");
  else go(state.done.a1 && state.done.a2 ? "finish" : "home");
}

/* ─── 화면 ─── */
function renderHome() {
  const acts = [
    { id: "a1", n: 1, title: "경청과 공감, 무슨 뜻일까?", desc: "귀 기울여 듣는 행동을 O X로 찾아봐요", color: "var(--teal)", icon: "👂" },
    { id: "a2", n: 2, title: "공감 대화 연습하기", desc: "친구의 마음에 어울리는 말을 골라 봐요", color: "var(--coral)", icon: "💬" },
    { id: "a3", n: 3, title: "여러 가지 감정 받아들이기", desc: "한 가지 상황, 여러 가지 마음을 찾아봐요", color: "var(--sun)", icon: "🌈" },
  ];
  return `
  <div class="wrap" style="padding-top:40px">
    <div class="center" style="margin-bottom:30px">
      <div style="font-size:64px;line-height:1">👂💛</div>
      <h1 class="jua" style="font-size:34px;margin-top:12px">귀 기울이면 마음이 들려요</h1>
      <p style="color:var(--sub);font-size:16px;margin-top:8px">4차시 · 경청과 공감으로 관계 맺기 (3~6학년)</p>
    </div>
    <div style="display:grid;gap:16px">
      ${acts.map(a => `
        <button class="pop" onclick="go('${a.id}')" style="background:#fff;border-radius:24px;padding:20px 22px;display:flex;align-items:center;gap:16px;text-align:left;box-shadow:0 4px 0 rgba(32,64,79,.08)">
          <span style="font-size:40px">${a.icon}</span>
          <span style="flex:1">
            <span class="jua" style="display:block;font-size:20px">활동 ${a.n}. ${a.title}</span>
            <span style="display:block;color:var(--sub);font-size:14px;margin-top:4px">${a.desc}</span>
          </span>
          <span class="jua" style="background:${state.done[a.id] ? a.color : "var(--soft)"};color:${state.done[a.id] ? "#fff" : "var(--sub)"};border-radius:999px;padding:6px 14px;font-size:14px;flex-shrink:0">
            ${state.done[a.id] ? "완료!" : "시작"}
          </span>
        </button>`).join("")}
    </div>
    <p class="center" style="color:var(--sub);font-size:13px;margin-top:24px">활동 1 → 2 → 3 순서로 하면 좋아요</p>
  </div>`;
}

function topbar(title, color) {
  return `
  <div class="topbar">
    <button class="backbtn pop" onclick="go('home')">← 처음</button>
    <span class="jua" style="color:${color};font-size:17px">${title}</span>
  </div>`;
}

function renderA1() {
  const st = state.a1;
  if (st.i >= quiz1.length) {
    return `
    <div class="wrap">
      ${topbar("활동 1 · 경청과 공감, 무슨 뜻일까?", "var(--teal)")}
      <div class="card center">
        <div style="font-size:56px">🎉</div>
        <h2 class="jua" style="font-size:26px;margin-top:10px">${quiz1.length}개 중 ${st.score}개를 맞혔어요!</h2>
        <div style="background:var(--soft);border-radius:16px;padding:18px;margin-top:18px;text-align:left;font-size:15px;line-height:1.7">
          <b>📌 오늘의 배움</b><br>
          <b>경청</b>은 귀와 눈과 마음으로 친구의 이야기를 끝까지 듣는 거예요.<br>
          <b>공감</b>은 친구의 마음을 함께 느끼고 알아주는 거예요.
        </div>
        <button class="bigbtn pop" style="background:var(--teal);margin-top:22px" onclick="finish('a1')">다음 활동으로 →</button>
      </div>
    </div>`;
  }
  const q = quiz1[st.i];
  const btn = (v, label) => {
    let bg = "var(--soft)", color = "var(--ink)";
    if (st.picked !== null && v === q.ear) { bg = "var(--teal)"; color = "#fff"; }
    if (st.picked !== null && v === st.picked && st.picked !== q.ear) { bg = "var(--wrong)"; }
    return `<button class="pop jua" onclick="pickA1(${v})" style="background:${bg};color:${color};font-size:18px;padding:14px 22px;border-radius:18px;flex:1;max-width:200px">${label}</button>`;
  };
  return `
  <div class="wrap">
    ${topbar("활동 1 · 경청과 공감, 무슨 뜻일까?", "var(--teal)")}
    <div class="badge">
      <span class="badge-n" style="background:var(--teal)">${st.i + 1}</span>
      <span class="badge-t">이 행동은 경청일까요? (${st.i + 1}/${quiz1.length})</span>
    </div>
    <div class="card">
      <p class="jua center" style="font-size:24px;line-height:1.5">“${esc(q.text)}”</p>
      <div style="display:flex;gap:14px;margin-top:24px;justify-content:center">
        ${btn(true, "⭕ 경청이에요")}${btn(false, "❌ 아니에요")}
      </div>
      ${st.picked !== null ? `
        <div class="fb" style="background:${st.picked === q.ear ? "var(--soft)" : "#FBEDE7"}">
          ${st.picked === q.ear ? "🌟 딩동댕! " : "🤔 다시 생각해 봐요. "}${esc(q.why)}
        </div>` : ""}
    </div>
    ${st.picked !== null ? `
      <div class="center" style="margin-top:20px">
        <button class="bigbtn pop" style="background:var(--teal)" onclick="nextA1()">${st.i === quiz1.length - 1 ? "결과 보기" : "다음 문제 →"}</button>
      </div>` : ""}
  </div>`;
}

function pickA1(v) {
  if (state.a1.picked !== null) return;
  state.a1.picked = v;
  if (v === quiz1[state.a1.i].ear) state.a1.score++;
  render();
}
function nextA1() { state.a1.picked = null; state.a1.i++; render(); window.scrollTo(0, 0); }

function renderA2() {
  const st = state.a2;
  if (st.i >= scenes.length) {
    return `
    <div class="wrap">
      ${topbar("활동 2 · 공감 대화 연습하기", "var(--coral)")}
      <div class="card center">
        <div style="font-size:56px">💖</div>
        <h2 class="jua" style="font-size:26px;margin-top:10px">공감 대화 연습 완료!</h2>
        <div style="background:#FDEFE8;border-radius:16px;padding:18px;margin-top:18px;text-align:left;font-size:15px;line-height:1.7">
          <b>📌 공감의 말 만들기</b><br>
          ① 친구의 감정에 이름을 붙여요 (“속상했겠다”)<br>
          ② 내 마음을 솔직하게 전해요 (“나도 걱정돼”)<br>
          ③ 충고는 마음을 알아준 다음에 해요
        </div>
        <button class="bigbtn pop" style="margin-top:22px" onclick="finish('a2')">다음 활동으로 →</button>
      </div>
    </div>`;
  }
  const s = scenes[st.i];
  return `
  <div class="wrap">
    ${topbar("활동 2 · 공감 대화 연습하기", "var(--coral)")}
    <div class="badge">
      <span class="badge-n" style="background:var(--coral)">${st.i + 1}</span>
      <span class="badge-t">친구에게 뭐라고 말할까요? (${st.i + 1}/${scenes.length})</span>
    </div>
    <div class="card">
      <div style="display:flex;gap:12px;align-items:flex-start">
        <span style="font-size:40px">${s.emoji}</span>
        <div style="background:var(--soft);border-radius:4px 20px 20px 20px;padding:14px 16px;font-size:16px;line-height:1.6;flex:1">${esc(s.friend)}</div>
      </div>
      <div style="display:grid;gap:12px;margin-top:22px">
        ${s.options.map((o, idx) => {
          let bg = "#fff", border = "2px solid var(--soft)";
          if (st.picked !== null && o.good) { bg = "#EAF6F3"; border = "2px solid var(--teal)"; }
          if (st.picked === idx && !o.good) { bg = "#FBEDE7"; border = "2px solid var(--wrong)"; }
          return `<button class="pop" ${st.picked !== null ? "disabled" : ""} onclick="pickA2(${idx})" style="background:${bg};border:${border};border-radius:16px;padding:14px 16px;text-align:left;font-size:15px;line-height:1.5;color:var(--ink)">${esc(o.text)}</button>`;
        }).join("")}
      </div>
      ${st.picked !== null ? `
        <div class="fb" style="background:${s.options[st.picked].good ? "#EAF6F3" : "#FBEDE7"}">
          ${s.options[st.picked].good ? "🌟 " : "🤔 "}${esc(s.options[st.picked].fb)}
        </div>` : ""}
    </div>
    ${st.picked !== null ? `
      <div class="center" style="margin-top:20px">
        <button class="bigbtn pop" onclick="nextA2()">${st.i === scenes.length - 1 ? "정리하기" : "다음 친구 →"}</button>
      </div>` : ""}
  </div>`;
}

function pickA2(idx) { if (state.a2.picked === null) { state.a2.picked = idx; render(); } }
function nextA2() { state.a2.picked = null; state.a2.i++; render(); window.scrollTo(0, 0); }

function renderA3() {
  const st = state.a3;
  return `
  <div class="wrap">
    ${topbar("활동 3 · 여러 가지 감정 받아들이기", "#D9A800")}
    <div class="badge">
      <span class="badge-n" style="background:var(--sun);color:var(--ink)">⏱</span>
      <span class="badge-t">짧은 시간 활동이에요!</span>
    </div>
    <div class="card">
      <div class="center">
        <span style="font-size:48px">${feelCase.emoji}</span>
        <p class="jua" style="font-size:20px;margin-top:10px;line-height:1.5">${esc(feelCase.situation)}</p>
        <p style="color:var(--sub);font-size:15px;margin-top:8px">이 친구는 어떤 마음일까요? <b>모두</b> 골라 보세요</p>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px">
        ${feelCase.feelings.map(f => {
          const on = st.chosen.includes(f.name);
          return `<button class="pop" onclick="toggleA3('${f.name}')" style="background:${on ? "var(--sun)" : "var(--soft)"};border-radius:18px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px">
            <span style="font-size:30px">${f.emoji}</span>
            <span class="jua" style="font-size:15px;color:var(--ink)">${f.name}</span>
          </button>`;
        }).join("")}
      </div>
      ${!st.show && st.chosen.length > 0 ? `
        <div class="center" style="margin-top:20px">
          <button class="bigbtn pop" style="background:var(--ink)" onclick="showA3()">골랐어요!</button>
        </div>` : ""}
      ${st.show ? `
        <div class="fb" style="background:#FFF6DC;line-height:1.7">
          🌈 <b>${st.chosen.map(esc).join(", ")}</b>을(를) 골랐네요!<br>
          정답은 따로 없어요. 같은 상황에서도 사람마다, 또 한 사람 안에서도 <b>여러 가지 감정</b>이 함께 생길 수 있어요.
          친구의 감정이 나와 달라도 “그럴 수 있어” 하고 받아들이는 것, 그것이 공감의 시작이에요.
        </div>` : ""}
    </div>
    ${st.show ? `
      <div class="center" style="margin-top:20px">
        <button class="bigbtn pop" style="background:var(--sun);color:var(--ink)" onclick="finish('a3')">모든 활동 끝내기 🎉</button>
      </div>` : ""}
  </div>`;
}

function toggleA3(name) {
  const st = state.a3;
  if (st.show) return;
  st.chosen = st.chosen.includes(name) ? st.chosen.filter(x => x !== name) : [...st.chosen, name];
  render();
}
function showA3() { state.a3.show = true; render(); }

function renderFinish() {
  return `
  <div class="wrap center" style="padding-top:60px">
    <div style="font-size:72px">🏅</div>
    <h1 class="jua" style="font-size:32px;margin-top:14px">오늘의 경청·공감 수업 완료!</h1>
    <div class="card" style="margin-top:24px;text-align:left">
      <p class="jua" style="font-size:19px;margin-bottom:12px">📝 오늘 배운 세 가지</p>
      <div style="font-size:15px;line-height:2">
        👂 경청은 귀와 눈과 마음으로 끝까지 듣는 것<br>
        💬 공감은 친구의 감정에 이름을 붙여 주는 것<br>
        🌈 같은 상황에도 여러 감정이 있고, 모두 괜찮다는 것
      </div>
    </div>
    <p style="color:var(--sub);font-size:15px;margin-top:20px;line-height:1.7">
      오늘 배운 공감의 말을 집이나 학교에서<br>친구와 가족에게 한 번씩 해 보세요!
    </p>
    <button class="bigbtn pop" style="background:var(--ink);margin-top:24px" onclick="go('home')">처음으로 돌아가기</button>
  </div>`;
}

function render() {
  const map = { home: renderHome, a1: renderA1, a2: renderA2, a3: renderA3, finish: renderFinish };
  app.innerHTML = map[state.screen]();
}
render();
</script>
</body>
